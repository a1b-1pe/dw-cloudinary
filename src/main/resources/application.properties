spring.servlet.multipart.max-file-size=120MB
spring.servlet.multipart.max-request-size=120MB
cloudname=${cloudname}
apikey=${apikey}
apisecret=${apisecret}
cloudinary_url=${cloudinary_url}
auth-service.base-url=${AUTH_SERVICE_URL:https://ld-authorization-service-e47c3397469c.herokuapp.com}
auth-service.connect-timeout-ms=${AUTH_SERVICE_CONNECT_TIMEOUT_MS:3000}
auth-service.read-timeout-ms=${AUTH_SERVICE_READ_TIMEOUT_MS:5000}
app.jwt.secret=${JWT_SECRET}
auth.fallback.enabled=${AUTH_FALLBACK_ENABLED:false}
auth.local-validation.enabled=${AUTH_LOCAL_VALIDATION_ENABLED:false}
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never